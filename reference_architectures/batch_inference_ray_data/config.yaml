# Ray + vLLM Batch Inference Configuration
# This configuration supports both CPU and GPU inference modes

# Constraints:
# - execution.num_workers <= lsf.num_workers
# - (lsf.num_workers × lsf.gpus_per_worker) % model.tensor_parallel_size == 0
# - Ensure memory_per_worker is sufficient for model + batch + Ray overhead

model:
  # Model name from HuggingFace or local path
  # IBM Granite model for code generation and general tasks
  # Note: Replace with your preferred IBM Granite model (e.g., ibm-granite/granite-3b-code-instruct, ibm-granite/granite-8b-code-instruct)
  name: "ibm-granite/granite-3b-code-base"
  
  # Tensor parallelism: number of GPUs per model instance
  # Options: 1, 2, 4, 8, or "auto" to use all available GPUs per worker
  tensor_parallel_size: 1
 
  # Effective number of model instances (workers) =
  #   (lsf.num_workers × lsf.gpus_per_worker) / tensor_parallel_size
  #
  # Example:
  #   num_workers=2, gpus_per_worker=2, tensor_parallel_size=2 → 2 model instances

  # Maximum sequence length
  max_model_len: 2048
  
  # Maximum number of sequences to process in parallel
  max_num_seqs: 256
  
  # GPU memory utilization (0.0 to 1.0)
  # Lower values leave more memory for KV cache
  gpu_memory_utilization: 0.9
  
  # Model dtype for vLLM on GPU.
  # Use "half" for T4/V100-class GPUs that do not support bfloat16.
  # Other common values: "auto", "float16", "bfloat16"
  dtype: "half"
  
  # Quantization (optional): "awq", "gptq", or null for no quantization
  quantization: null

execution:
  # Workload implementation to run.
  # Options: "ray_data" or "actors"
  mode: "actors"

  # Number of workers to use (<= lsf.num_workers)
  # In "actors" mode: Ray actors
  # In "ray_data" mode: parallel workers processing dataset partitions
  # "auto" = use all workers allocated by LSF
  num_workers: "auto"

  # Number of CPU cores each worker should use
  cpus_per_worker: 4  # enforced by Ray, not LSF
  
  # Batch size for inference
  batch_size: 16
  
  # Device selection
  device: "gpu"   # gpu | cpu
  
  # Maximum retries for failed tasks
  max_retries: 3

ray:
  # Ray object store memory passed to common/start_ray_cluster.sh
  # Must fit within available memory per node: (lsf.memory_per_worker × workers_per_node)
  object_store_memory_bytes: 8000000000

  # Must fit within available memory per node.
  # Total memory per node is approximately:
  #   workers_per_node × memory_per_worker
  #
  # Recommended: object_store_memory ≈ 20–40% of node memory

data:
  # Input data path (JSONL format with "text" or "prompt" field)
  input_path: "reference_architectures/batch_inference_ray_data/dataset/sample_prompts.jsonl"
  
  # Output path for results. %J or {job_id} will be replaced with the LSF job ID.
  output_path: "reference_architectures/batch_inference_ray_data/output/results.%J.jsonl"
  
  # Maximum number of prompts to process (null for all)
  max_prompts: null

generation:
  # Sampling temperature (0.0 = greedy, higher = more random)
  temperature: 0.7
  
  # Top-p sampling
  top_p: 0.9
  
  # Maximum tokens to generate
  max_tokens: 512
  
  # Number of sequences to generate per prompt
  n: 1
  
  # Stop sequences
  stop: null

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Enable progress bar
  show_progress: true
  
  # Log interval (seconds)
  log_interval: 10

lsf:
  # Total GPUs allocated = num_workers × gpus_per_worker

  # LSF queue name. Leave unset to let LSF choose the default queue.
  queue: "normal"

  # Job name shown in LSF tools such as bjobs and bhist.
  job_name: "ray_batch"

  # Standard output log path for the LSF job. %J expands to the LSF job ID.
  output_log: "reference_architectures/batch_inference_ray_data/output/output.%J"

  # Total number of workers to request for this job.
  num_workers: 2

  # Number of GPUs requested per worker.
  gpus_per_worker: 1

  # Memory requested per worker.
  memory_per_worker: "8GB"

  # When true, constrain the allocation to a single host.
  restrict_to_single_host: false

