# Ray + vLLM Batch Inference Configuration
# This configuration supports both CPU and GPU inference modes

model:
  # Model name from HuggingFace or local path
  # IBM Granite model for code generation and general tasks
  # Note: Replace with your preferred IBM Granite model (e.g., ibm-granite/granite-3b-code-instruct, ibm-granite/granite-8b-code-instruct)
  name: "ibm-granite/granite-3b-code-base"
  
  # Tensor parallelism: number of GPUs per model instance
  # Options: 1, 2, 4, 8, or "auto" to use all available GPUs per worker
  tensor_parallel_size: 1
  
  # Maximum sequence length
  max_model_len: 2048
  
  # Maximum number of sequences to process in parallel
  max_num_seqs: 256
  
  # GPU memory utilization (0.0 to 1.0)
  # Lower values leave more memory for KV cache
  gpu_memory_utilization: 0.9
  
  # Model dtype for vLLM on GPU.
  # Use "half" for T4/V100-class GPUs that do not support bfloat16.
  # Other common values: "auto", "float16", "bfloat16"
  dtype: "half"
  
  # Quantization (optional): "awq", "gptq", or null for no quantization
  quantization: null

execution:
  # Number of vLLM worker actors
  # "auto" will create one actor per available GPU (or per tensor_parallel_size GPUs)
  # For CPU mode, set to number of desired workers
  num_workers: "auto"
  
  # Batch size for inference
  batch_size: 16
  
  # Use GPU if available (set to false for CPU-only testing)
  use_gpu: true
  
  # CPU-only mode (for testing without GPUs)
  cpu_only: false
  
  # Maximum retries for failed tasks
  max_retries: 3

data:
  # Input data path (JSONL format with "text" or "prompt" field)
  input_path: "reference_architectures/batch_inference_ray_data/dataset/sample_prompts.jsonl"
  
  # Output path for results. %J or {job_id} will be replaced with the LSF job ID.
  output_path: "reference_architectures/batch_inference_ray_data/output/results.%J.jsonl"
  
  # Maximum number of prompts to process (null for all)
  max_prompts: null

generation:
  # Sampling temperature (0.0 = greedy, higher = more random)
  temperature: 0.7
  
  # Top-p sampling
  top_p: 0.9
  
  # Maximum tokens to generate
  max_tokens: 512
  
  # Number of sequences to generate per prompt
  n: 1
  
  # Stop sequences
  stop: null

logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  
  # Enable progress bar
  show_progress: true
  
  # Log interval (seconds)
  log_interval: 10

# LSF submission settings consumed by submit_lsf.sh.
# Users should only need to edit this file for their environment.
lsf:
  queue: "normal"
  job_name: "ray_batch"
  output_log: "reference_architectures/batch_inference_ray_data/output/output.%J"
  workload_script: "workload_actors.py"
  num_nodes: 2
  tasks_per_node: 1
  cpus_per_task: 4
  gpus_per_task: 1
  walltime: "01:00"
  memory: "8GB"
  memory_per_task: "8GB"
  ray_object_store_memory_bytes: 8000000000
  gpu_mode: "j_exclusive=yes"

