# Description:
# Distributed GPU inference using Ray actors across hosts.
# Each worker consumes all GPUs on its host.

lsf:
  num_workers: 2
  cpus_per_worker: 4
  gpus_per_worker: 2
  memory_per_worker: "8GB"
  interactive: false

execution:
  mode: "actors"
  num_workers: "auto"
  device: "gpu"
  batch_size: 32

model:
  name: "ibm-granite/granite-3b-instruct"
  tensor_parallel_size: 2
  max_model_len: 2048
  max_num_seqs: 256
  gpu_memory_utilization: 0.9

generation:
  temperature: 0.2
  top_p: 0.9
  max_tokens: 200
  n: 1

data:
  input_path: "{repo_root}/reference_architectures/batch_inference/dataset/sample_prompts.jsonl"
  output_dir: "{repo_root}/outputs/batch_inference/{job_id}"

logging:
  level: "INFO"
