# Description:
# Interactive GPU inference using Ray actors for debugging and testing.

lsf:
  num_workers: 1
  cpus_per_worker: 2
  gpus_per_worker: 1
  memory_per_worker: "8GB"
  interactive: true
  output_log: "{repo_root}/outputs/batch_inference/{job_id}/lsf.log"

execution:
  mode: "actors"
  num_workers: "auto"
  device: "gpu"
  batch_size: 4

model:
  name: "ibm-granite/granite-3b-code-base"
  tensor_parallel_size: 1
  max_model_len: 1024
  max_num_seqs: 32
  gpu_memory_utilization: 0.8

generation:
  temperature: 0.7
  top_p: 0.9
  max_tokens: 64
  n: 1

data:
  input_path: "{repo_root}/reference_architectures/batch_inference/dataset/sample_prompts.jsonl"
  output_path: "{repo_root}/outputs/batch_inference/{job_id}/results.jsonl"
  max_prompts: 20

logging:
  level: "DEBUG"
