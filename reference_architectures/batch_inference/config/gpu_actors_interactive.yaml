# Description:
# Interactive GPU inference using Ray actors for debugging and testing.
# Uses OPT-1.3B model (no authentication required, fits in single GPU).

lsf:
  num_workers: 2
  cpus_per_worker: 2
  gpus_per_worker: 1
  memory_per_worker: "8GB"
  use_affinity: true
  interactive: true

execution:
  mode: "actors"
  num_workers: "auto"
  device: "gpu"
  batch_size: 4

model:
  name: "facebook/opt-1.3b"
  tensor_parallel_size: 1
  max_model_len: 2048
  max_num_seqs: 256
  gpu_memory_utilization: 0.9

generation:
  temperature: 0.2
  top_p: 0.9
  max_tokens: 200
  n: 1

data:
  input_path: "{repo_root}/reference_architectures/batch_inference/dataset/sample_prompts.jsonl"
  output_dir: "{repo_root}/outputs/batch_inference/{job_id}"
  max_prompts: 20

logging:
  level: "DEBUG"
