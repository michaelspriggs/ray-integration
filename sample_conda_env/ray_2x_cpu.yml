name: ray_cpu
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Core dependencies
  - pip=24.0
  - setuptools=69.0
  
  # Scientific computing
  - numpy=1.26
  - pandas=2.2
  - scipy=1.12
  
  # System libraries
  - ca-certificates
  - openssl=3.2
  
  # Build tools
  - gcc_linux-64
  - gxx_linux-64
  
  # Pip packages
  - pip:
    # Ray and related
    - ray[default]==2.40.0
    - ray[data]==2.40.0
    
    # Machine Learning frameworks (CPU versions)
    # Note: Install PyTorch CPU separately after environment creation
    # Run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
    - torch==2.2.0
    - torchvision==0.17.0
    
    # LLM inference (CPU mode)
    # Note: vLLM CPU support is limited. For CPU testing, use smaller models
    # or consider using transformers directly
    - transformers==4.38.0
    - accelerate==0.27.0
    - tokenizers==0.15.0
    - sentencepiece==0.1.99
    
    # Data handling
    - datasets==2.17.0
    - pyarrow==15.0.0
    
    # Utilities
    - pyyaml==6.0.1
    - tqdm==4.66.1
    - filelock==3.13.1
    - psutil==5.9.8
    - aiohttp==3.9.3
    - requests==2.31.0
    
    # Monitoring and metrics
    - prometheus-client==0.20.0
    - gpustat==1.1.1
    
    # Testing
    - pytest==8.0.0
    - pytest-asyncio==0.23.5
    
    # Code quality
    - ruff==0.2.0
    - black==24.2.0
    - mypy==1.8.0

# Made with Bob
