name: ray_gpu
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Core dependencies
  - pip=24.0
  - setuptools=69.0
  
  # CUDA toolkit
  - cudatoolkit=11.8
  - cudnn=8.9
  
  # Scientific computing
  - numpy=1.26
  - pandas=2.2
  - scipy=1.12
  
  # System libraries
  - ca-certificates
  - openssl=3.2
  
  # Build tools
  - gcc_linux-64
  - gxx_linux-64
  
  # Pip packages
  - pip:
    # Ray and related
    - ray[default]==2.40.0
    - ray[data]==2.40.0
    
    # Machine Learning frameworks (GPU versions)
    - torch==2.2.0
    - torchvision==0.17.0
    - torchaudio==2.2.0
    
    # LLM inference with GPU support
    - vllm==0.3.0
    - transformers==4.38.0
    - accelerate==0.27.0
    - tokenizers==0.15.0
    - bitsandbytes==0.42.0
    
    # Flash attention for performance
    - flash-attn==2.5.0
    
    # Data handling
    - datasets==2.17.0
    - pyarrow==15.0.0
    
    # Utilities
    - pyyaml==6.0.1
    - tqdm==4.66.1
    - filelock==3.13.1
    - psutil==5.9.8
    - aiohttp==3.9.3
    - requests==2.31.0
    
    # Monitoring and metrics
    - prometheus-client==0.20.0
    - gpustat==1.1.1
    - nvidia-ml-py==12.535.133
    
    # Testing
    - pytest==8.0.0
    - pytest-asyncio==0.23.5
    
    # Code quality
    - ruff==0.2.0
    - black==24.2.0
    - mypy==1.8.0

# Made with Bob
